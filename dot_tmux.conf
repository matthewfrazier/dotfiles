set -g mouse on

# Window navigation with Alt+[ and Alt+]
bind -n M-] next-window
bind -n M-[ previous-window
bind -n S-Right next-window
bind -n S-Left previous-window

#bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
#bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xclip -in -selection clipboard"
#bind -T copy-mode MouseDragEnd1Pane send -X copy-selection-no-clear 'pbcopy'

# Lava/red theme - no catppuccin
set -g status-style "bg=#2a0a0a,fg=#d4a0a0"
set -g status-right ""
set -g status-left ""
set -g window-status-format "#[fg=#8a5a5a,bg=#2a0a0a] #W "
set -g window-status-current-format "#[fg=#ffccaa,bg=#6b1a1a,bold] #W #[nobold]"
set -g pane-border-style "fg=#3a1515"
set -g pane-active-border-style "fg=#aa3333"
set -g message-style "fg=#ffccaa,bg=#3a1515"
set -g mode-style "bg=#3a1515,bold"

# Session save/restore (plugins installed by ~/.local/bin/tmux-persist-setup on enroll/boot)
set -g @resurrect-dir '~/.tmux/resurrect'          # persistent on hosts/LXCs; a volume in Docker containers
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"~claude->claude --continue"'
set -g @continuum-restore 'on'                     # auto-restore last layout on tmux server start
set -g @continuum-save-interval '5'
if-shell '[ -e ~/.tmux/plugins/tmux-resurrect/resurrect.tmux ]' 'run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
if-shell '[ -e ~/.tmux/plugins/tmux-continuum/continuum.tmux ]' 'run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux'
# explicit manual save/restore (resurrect defaults, bound here so they always exist)
bind C-s run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh
bind C-r run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh

# Pass terminal focus in/out to apps (Claude Code uses focus events)
set -g focus-events on

# per-box overrides (themes etc.) — survives chezmoi update
source-file -q ~/.tmux.conf.local
