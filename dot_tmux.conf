set -g mouse on

# Window navigation with Alt+[ and Alt+]
bind -n M-] next-window
bind -n M-[ previous-window
bind -n S-Right next-window
bind -n S-Left previous-window

#bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
#bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xclip -in -selection clipboard"
#bind -T copy-mode MouseDragEnd1Pane send -X copy-selection-no-clear 'pbcopy'

# Lava/red theme - no catppuccin
set -g status-style "bg=#2a0a0a,fg=#d4a0a0"
set -g status-right ""
set -g status-left ""
set -g window-status-format "#[fg=#8a5a5a,bg=#2a0a0a] #W "
set -g window-status-current-format "#[fg=#ffccaa,bg=#6b1a1a,bold] #W #[nobold]"
set -g pane-border-style "fg=#3a1515"
set -g pane-active-border-style "fg=#aa3333"
set -g message-style "fg=#ffccaa,bg=#3a1515"
set -g mode-style "bg=#3a1515,bold"

# Session save/restore
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"~claude->claude *"'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux
